# AeroSpace config - migrated from yabai + skhd
# https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

# Launch borders at startup with default color (blue = main mode)
after-startup-command = [
    'exec-and-forget borders active_color=0xff1122ff inactive_color=0x00000000 width=5.0'
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

# BSP equivalent: tiles layout with auto orientation
# (wide monitor → horizontal split, tall monitor → vertical split)
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Move mouse to center of focused window on any focus change
# (replicates yabai mouse_follows_focus; covers both same-monitor and cross-monitor)
on-focus-changed = ['move-mouse window-force-center']

# Prevent cmd-h from hiding windows (replaces skhd cmd-h intercept)
automatically-unhide-macos-hidden-apps = true

# Keep workspaces 1-3 alive even when empty
persistent-workspaces = ["1", "2", "3"]

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 14
    inner.vertical   = 14
    outer.left       = 14
    outer.bottom     = 14
    outer.top        = 14
    outer.right      = 14

# ─── main mode ────────────────────────────────────────────────────────────────

[mode.main.binding]
    # Enter window_control mode → borders turn red
    alt-a = ['exec-and-forget borders active_color=0xffff1111 inactive_color=0x00000000 width=5.0', 'mode window_control']

    alt-tab = 'focus dfs-next --boundaries-action wrap-around-the-workspace'

    # Workspace switching (was noop in skhd, now active)
    ctrl-1 = 'workspace 1'
    ctrl-2 = 'workspace 2'
    ctrl-3 = 'workspace 3'

# ─── window_control mode ──────────────────────────────────────────────────────

[mode.window_control.binding]
    # Exit mode → borders back to blue
    enter = ['exec-and-forget borders active_color=0xff1122ff inactive_color=0x00000000 width=5.0', 'mode main']
    esc   = ['exec-and-forget borders active_color=0xff1122ff inactive_color=0x00000000 width=5.0', 'mode main']

    # Focus window (with implicit monitor crossing via AeroSpace tree)
    h = 'focus left'
    j = 'focus down'
    k = 'focus up'
    l = 'focus right'

    # Resize window
    shift-h = 'resize width -100'
    shift-l = 'resize width +100'
    shift-j = 'resize height +100'
    shift-k = 'resize height -100'

    # Move window (crosses monitor boundary when at edge, ≈ yabai swap + display move)
    cmd-h = 'move --boundaries all-monitors-outer-frame left'
    cmd-j = 'move --boundaries all-monitors-outer-frame down'
    cmd-k = 'move --boundaries all-monitors-outer-frame up'
    cmd-l = 'move --boundaries all-monitors-outer-frame right'

    # Join with adjacent window into a container
    alt-h = 'join-with left'
    alt-j = 'join-with down'
    alt-k = 'join-with up'
    alt-l = 'join-with right'

    # Layout controls
    z = 'fullscreen'                  # toggle fullscreen   (≈ yabai zoom-fullscreen)
    e = 'layout horizontal vertical'  # toggle orientation  (≈ yabai rotate 90)
    b = 'balance-sizes'               # equalize window sizes (new)

    alt-tab = 'focus dfs-next --boundaries-action wrap-around-the-workspace'

    # Workspace switching
    ctrl-1 = 'workspace 1'
    ctrl-2 = 'workspace 2'
    ctrl-3 = 'workspace 3'

    # Move focused window to workspace
    ctrl-shift-1 = 'move-node-to-workspace 1'
    ctrl-shift-2 = 'move-node-to-workspace 2'
    ctrl-shift-3 = 'move-node-to-workspace 3'
