[settings]
legacy_version_file = true

[tools]
node = "latest"
python = "latest"
java = "latest"
go = "latest"

[tasks.mcp-gateway]
description = "Docker MCP Gateway をリモートMCPサーバとして起動する"
run = """
sbx policy allow network localhost:8080
docker mcp gateway run --transport streaming --port 8080
"""

[tasks.backup-mise-local]
description = "~/ghq/ 配下の mise.local.toml をtarボールに固める"
run = """
output="$HOME/mise-local-$(date +%Y%m%d%H%M%S).tar.gz"
find "$HOME/ghq" -name "mise.local.toml" -print0 | tar -czf "$output" --null -T -
echo "Created: $output"
"""

