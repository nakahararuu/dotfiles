name: InstallTest

on: [push]

jobs:
  install-dotfiles:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15, macos-latest]
    steps:
      - uses: actions/checkout@v1
      - name: Install required packages
        run: brew install bash
      - name: create chezmoi directory
        run: mkdir -p ~/.config/chezmoi 
      - name: create chezmoi conf file
        run: |
          cat << EOF > ~/.config/chezmoi/chezmoi.toml
          [data]
          machineType = 'biz'

          [data.git]
          organization = 'hogehoge-inc'
          user = 'hoge'
          email = 'hoge@biz.co.jp'
          signingkey = 'hogehoge'
          EOF
      - name: Install chezmoi
        run: brew install chezmoi
      - name: Install dotfiles
        run: chezmoi init --apply "$GITHUB_WORKSPACE"

